<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE-OS // ULTIMATE TERMINAL 2026</title>
    <style>
        /* 
           ========================================
           GLOBAL THEME & LAYER FIXES
           ========================================
        */
        :root {
            --primary: #0ea5e9;
            --bg: #020617;
            --card: #0f172a;
            --border: #1e293b;
            --text: #f8fafc;
            --dim: #94a3b8;
            --neon: #22c55e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* FIX: Ensure background stays BEHIND everything */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; 
            pointer-events: none; /* Allows clicks to pass through to buttons */
            opacity: 0.3;
        }

        /* 
           ========================================
           SIDE NAVIGATION
           ========================================
        */
        nav {
            width: 260px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100; /* Sidebar on top */
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -1px;
            margin-bottom: 30px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--dim);
            padding: 12px;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .nav-btn:hover {
            background: rgba(14, 165, 233, 0.1);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* 
           ========================================
           MAIN DASHBOARD GRID
           ========================================
        */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            z-index: 10; /* Content on top */
        }

        .full-width { grid-column: span 3; }
        .two-thirds { grid-column: span 2; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            position: relative;
            z-index: 20; /* Components on top */
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--dim);
        }

        /* 
           ========================================
           INTERACTIVE COMPONENTS
           ========================================
        */
        #timer-display {
            font-size: 4rem;
            font-weight: 800;
            text-align: center;
            margin: 10px 0;
            font-family: monospace;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            resize: none;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }

        .btn:active { transform: scale(0.98); }

        /* GAME FRAME */
        .game-monitor {
            height: 450px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* FOOTER */
        footer {
            grid-column: span 3;
            text-align: center;
            padding: 50px 0;
            border-top: 1px solid var(--border);
        }

        .legal { font-size: 0.7rem; color: #4b5563; margin: 5px; }

    </style>
</head>
<body>

<!-- This canvas is layered BEHIND buttons -->
<canvas id="bg-canvas"></canvas>

<nav>
    <div class="logo">CORE-OS</div>
    <button class="nav-btn" onclick="setName()">👤 IDENT: <span id="user-side">USER</span></button>
    <button class="nav-btn" onclick="loadGame()">🕹️ LAUNCH GAME</button>
    <button class="nav-btn" onclick="getFact()">💡 REFRESH INTEL</button>
    <button class="nav-btn" onclick="getJoke()">😂 COMEDY SUBROUTINE</button>
    
    <div style="margin-top: auto; font-family: monospace; font-size: 0.8rem; color: var(--neon);">
        [SESSION]: <span id="sess-timer">00:00</span>
    </div>
</nav>

<main>
    <div class="full-width" style="display:flex; justify-content:space-between; align-items:flex-end;">
        <h1 style="margin:0;">Dashboard // <span id="welcome-user">Officer</span></h1>
        <div id="clock" style="font-size:1.5rem; font-weight:700; color:var(--primary);">00:00:00</div>
    </div>

    <!-- TIMER CARD -->
    <div class="card">
        <h3>Focus Protocol</h3>
        <div id="timer-display">25:00</div>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="startTimer()">START</button>
            <button class="btn" style="background:#334155;" onclick="togglePause()">PAUSE</button>
        </div>
    </div>

    <!-- NOTES CARD -->
    <div class="card">
        <h3>Encrypted Notes</h3>
        <textarea id="note-area" placeholder="Write here..."></textarea>
        <button class="btn" onclick="exportNotes()" style="background:transparent; border:1px solid var(--primary); color:var(--primary);">EXPORT .TXT</button>
    </div>

    <!-- INTEL CARD -->
    <div class="card">
        <h3>Data Intel</h3>
        <p id="multi-out" style="font-size:0.9rem; color:var(--dim); line-height:1.6; min-height:80px;">Standing by for input...</p>
        <button class="btn" onclick="genBook()" style="font-size:0.7rem;">GENERATE BOOK PLOT</button>
    </div>

    <!-- GAME CARD -->
    <div class="two-thirds card game-monitor" style="padding:0;">
        <div id="msg" style="text-align:center; padding-top:200px; color:#334155;">INITIATE MODULE TO LOAD GAME.</div>
        <iframe id="game-frame" style="display:none"></iframe>
    </div>

    <!-- TASKS CARD -->
    <div class="card">
        <h3>Objectives</h3>
        <input type="text" id="task-in" placeholder="+ Add New Task">
        <div id="task-list" style="max-height:300px; overflow-y:auto;"></div>
    </div>

    <footer>
        <p class="legal">Made by Cole (Dark)</p>
        <p class="legal">&copy; Copyright 2026 Core-OS Technologies. All rights reserved.</p>
    </footer>
</main>

<script>
    // --- IDENTITY ---
    function setName() {
        const n = prompt("Identity required:");
        if(n) { localStorage.setItem('cName', n); location.reload(); }
    }
    const name = localStorage.getItem('cName') || "OFFICER";
    document.getElementById('user-side').innerText = name.toUpperCase();
    document.getElementById('welcome-user').innerText = name;

    // --- DATA REPOSITORIES ---
    const facts = ["Honey never spoils.", "Octopuses have 3 hearts.", "Wombat poop is cube-shaped.", "Bananas are berries."];
    const jokes = ["Why did the computer show up late? It had a hard drive.", "Programmers love dark mode because light attracts bugs."];
    const plots = ["A chef in space", "A robot who paints", "A detective in a VR world"];

    function getFact() { document.getElementById('multi-out').innerText = facts[Math.floor(Math.random()*facts.length)]; }
    function getJoke() { document.getElementById('multi-out').innerText = jokes[Math.floor(Math.random()*jokes.length)]; }
    function genBook() { document.getElementById('multi-out').innerText = plots[Math.floor(Math.random()*plots.length)] + " trying to save a glitching city."; }

    // --- TIMER ---
    let time, tId, isPaused = false;
    function startTimer() {
        clearInterval(tId); time = 25 * 60; isPaused = false;
        tId = setInterval(() => {
            if(!isPaused && time >= 0) {
                const m = Math.floor(time/60), s = time%60;
                document.getElementById('timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if(time-- === 0) { clearInterval(tId); alert("DONE!"); }
            }
        }, 1000);
    }
    function togglePause() { isPaused = !isPaused; }

    // --- NOTES ---
    const notes = document.getElementById('note-area');
    notes.value = localStorage.getItem('cNotes') || "";
    notes.addEventListener('input', () => localStorage.setItem('cNotes', notes.value));
    function exportNotes() {
        const blob = new Blob([notes.value], {type: "text/plain"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "notes.txt";
        a.click();
    }

    // --- TASKS ---
    document.getElementById('task-in').addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && e.target.value) {
            const div = document.createElement('div');
            div.style = "background:#1e293b; padding:10px; margin-bottom:5px; border-radius:5px; display:flex; justify-content:space-between;";
            div.innerHTML = `<span>${e.target.value}</span><span onclick="this.parentElement.remove()" style="color:red; cursor:pointer;">×</span>`;
            document.getElementById('task-list').prepend(div);
            e.target.value = "";
        }
    });

    // --- GAME ---
    function loadGame() {
        document.getElementById('msg').style.display = 'none';
        const f = document.getElementById('game-frame');
        f.style.display = 'block';
        f.src = "https://mshayer.com";
    }

    // --- CLOCK & SESSION ---
    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    let sTime = 0;
    setInterval(() => {
        sTime++;
        const m = Math.floor(sTime/60), s = sTime%60;
        document.getElementById('sess-timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);

    // --- BACKGROUND ENGINE (Layer 0) ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    function draw() {
        ctx.fillStyle = "rgba(2, 6, 23, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0ea5e9";
        for(let i=0; i<20; i++) {
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 1, 0, Math.PI*2);
            ctx.fill();
        }
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
